name: myclosly
description: My Closly - The social circle of shopping
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # Network
  dio: ^5.4.0

  # Storage
  get_storage: ^2.1.1

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0

  # Utils
  intl: ^0.19.0
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  pin_code_fields: ^8.0.1

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true